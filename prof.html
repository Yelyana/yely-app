<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yely — Espace Prof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f0d14; --bg2: #1a1625; --bg3: #231e30;
    --accent: #9b7ddb; --accent2: #7c5cbf;
    --text: #f0eaf8; --text2: #b8afd4; --text3: #7a7090;
    --border: #2e2840; --green: #7dbf9b; --pink: #f5a4a8; --red: #e87a7a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* AUTH */
  .auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .auth-card { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:32px; width:100%; max-width:380px; }
  .auth-logo { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300; margin-bottom:6px; }
  .auth-sub { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:28px; }

  /* APP */
  .app { display:none; }
  .sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:var(--bg2); border-right:1px solid var(--border); padding:24px 16px; display:flex; flex-direction:column; gap:4px; z-index:10; }
  .sidebar-logo { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; padding:0 8px; margin-bottom:20px; }
  .sidebar-logo .sub { font-size:9px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
  .nav-link { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:13px; width:100%; text-align:left; transition:all .15s; }
  .nav-link:hover { background:var(--bg3); color:var(--text); }
  .nav-link.active { background:var(--accent)22; color:var(--accent); }
  .main { margin-left:220px; padding:32px; min-height:100vh; }

  /* MOBILE */
  .mobile-top { display:none; position:fixed; top:0; left:0; right:0; background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 16px; z-index:10; align-items:center; justify-content:space-between; }
  .mobile-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); padding:8px 0; z-index:10; }
  .mobile-tabs { display:flex; }
  .mobile-tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 4px; border:none; background:transparent; color:var(--text3); cursor:pointer; font-size:10px; }
  .mobile-tab.active { color:var(--accent); }
  .mobile-tab .icon { font-size:20px; }

  /* Tablette étroite — sidebar plus compacte */
  @media(max-width:900px) and (min-width:769px) {
    .sidebar { width:180px; }
    .main { margin-left:180px; padding:24px 20px; }
    .sidebar-logo img { height:64px !important; }
  }

  @media(max-width:768px) {
    .sidebar { display:none; }
    .mobile-top { display:flex; }
    .mobile-bar { display:block; }
    .main { margin-left:0; padding:16px; padding-top:70px; padding-bottom:80px; }
  }

  /* Large écran — grilles plus larges */
  @media(min-width:1300px) {
    .grid-3 { grid-template-columns:repeat(4,1fr); }
    .main { padding:40px 48px; }
  }

  @media(max-width:600px) { .grid-3,.grid-2 { grid-template-columns:1fr; } }

  /* COMPONENTS */
  .page-title { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; margin-bottom:4px; }
  .page-sub { font-size:13px; color:var(--text3); margin-bottom:24px; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:16px; }
  .section-title { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px; }
  .stat-val { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; }
  .stat-lbl { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }

  .btn { padding:12px 20px; border-radius:12px; border:none; cursor:pointer; font-size:14px; font-weight:500; font-family:'Inter',sans-serif; transition:all .15s; width:100%; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-sm { padding:6px 14px; font-size:12px; border-radius:8px; width:auto; }
  .btn-danger { background:#e87a7a22; color:var(--red); border:1px solid #e87a7a44; }

  label { display:block; font-size:11px; color:var(--text3); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
  input, select, textarea { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  .form-group { margin-bottom:16px; }

  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
  .badge-green { background:rgba(125,191,155,.15); color:var(--green); }
  .badge-violet { background:rgba(155,125,219,.15); color:var(--accent); }
  .badge-red { background:rgba(232,122,122,.15); color:var(--red); }
  .badge-orange { background:rgba(251,146,60,.15); color:#fb923c; }

  .cours-pill { background:var(--bg3); border-radius:10px; padding:10px 12px; margin-bottom:6px; cursor:pointer; border-left:3px solid var(--accent); transition:opacity .15s; }
  .cours-pill:hover { opacity:.85; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
  .modal-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; margin-bottom:16px; }

  .loading { display:flex; align-items:center; justify-content:center; gap:12px; padding:60px; color:var(--text3); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .week-nav { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .week-nav button { padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; font-size:14px; }

  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px 20px; font-size:13px; z-index:200; opacity:0; transition:opacity .3s; white-space:nowrap; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:20px">
      <img src="https://yelyana.github.io/Yelyintheair/yely-images/logo.svg" alt="Yely in the Air" style="height:90px;width:auto;filter:brightness(0) invert(1);opacity:0.9">
    </div>
    <div class="auth-sub" style="text-align:center">Espace professeur</div>
    <div id="auth-form">
      <div class="form-group"><label>Email</label><input type="email" id="p-email" placeholder="ton@email.com"></div>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="p-password"></div>
      <button class="btn btn-primary" onclick="profLogin()">Connexion</button>
      <button class="btn btn-ghost" style="margin-top:8px;font-size:12px" onclick="showResetPassword()">Mot de passe oublié / Changer mon mot de passe</button>
    </div>
    <div id="auth-reset" style="display:none">
      <div class="form-group"><label>Ton email</label><input type="email" id="p-reset-email"></div>
      <button class="btn btn-primary" onclick="sendReset()">Envoyer le lien de réinitialisation</button>
      <button class="btn btn-ghost" style="margin-top:8px;font-size:12px" onclick="showLogin()">Retour</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="https://yelyana.github.io/Yelyintheair/yely-images/logo.svg" alt="Yely in the Air" style="height:80px;width:auto;filter:brightness(0) invert(1);opacity:0.9;display:block;margin-bottom:6px">
      <span class="sub">Espace Prof</span>
    </div>
    <button class="nav-link active" id="nav-planning" onclick="showPage('planning')">📅 Planning</button>
    <button class="nav-link" id="nav-eleves" onclick="showPage('eleves')">👩 Mes élèves</button>
    <button class="nav-link" id="nav-communaute" onclick="showPage('communaute')">💬 Communauté</button>
    <button class="nav-link" id="nav-stats" onclick="showPage('stats')">📊 Mes stats</button>
    <button class="nav-link" id="nav-profil" onclick="showPage('profil')">⚙️ Mon profil</button>
    <div style="flex:1"></div>
    <button class="nav-link" onclick="profLogout()" style="color:var(--text3)">← Déconnexion</button>
  </div>

  <div class="mobile-top">
    <img src="https://yelyana.github.io/Yelyintheair/yely-images/logo.svg" style="height:38px;width:auto;filter:brightness(0) invert(1);opacity:0.9">
  </div>

  <div class="mobile-bar">
    <div class="mobile-tabs">
      <button class="mobile-tab active" id="mob-planning" onclick="showPage('planning')"><span class="icon">📅</span>Planning</button>
      <button class="mobile-tab" id="mob-eleves" onclick="showPage('eleves')"><span class="icon">👩</span>Élèves</button>
      <button class="mobile-tab" id="mob-communaute" onclick="showPage('communaute')"><span class="icon">💬</span>Commu</button>
      <button class="mobile-tab" id="mob-stats" onclick="showPage('stats')"><span class="icon">📊</span>Stats</button>
      <button class="mobile-tab" id="mob-profil" onclick="showPage('profil')"><span class="icon">⚙️</span>Profil</button>
    </div>
  </div>

  <div class="main" id="main-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal"><div id="modal-body"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const SUPABASE_URL = 'https://xayixasuyuranscustyw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhheWl4YXN1eXVyYW5zY3VzdHl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjIwMTIsImV4cCI6MjA5ODE5ODAxMn0.Kp_cJd5YMtbFZnUvUhd-4wMf0enjcBWsGzjwQSnAPP4';

const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storageKey: 'yely-prof-auth' }
});

let currentUser = null;
let currentProf = null;
let profWeekOffset = 0;
let profPlanningDay = (new Date().getDay() + 6) % 7;
if (profPlanningDay > 5) profPlanningDay = 0;

const JOURS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const JOURS_FULL = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

// ── AUTH ──────────────────────────────────────────────────
async function profLogin() {
  const email = document.getElementById('p-email').value.trim();
  const password = document.getElementById('p-password').value;
  if (!email || !password) return showToast('Email et mot de passe requis', true);
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) return showToast(error.message, true);
  await initProf(data.user);
}

async function sendReset() {
  const email = document.getElementById('p-reset-email').value.trim();
  if (!email) return showToast('Entre ton email', true);
  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/prof.html'
  });
  if (error) return showToast(error.message, true);
  showToast('Email envoyé ! Vérifie ta boîte mail.');
  showLogin();
}

function showResetPassword() {
  document.getElementById('auth-form').style.display = 'none';
  document.getElementById('auth-reset').style.display = 'block';
  document.getElementById('p-reset-email').value = document.getElementById('p-email').value;
}
function showLogin() {
  document.getElementById('auth-form').style.display = 'block';
  document.getElementById('auth-reset').style.display = 'none';
}

async function profLogout() {
  await db.auth.signOut();
  currentUser = null; currentProf = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function initProf(user) {
  currentUser = user;
  const { data } = await db.from('profiles').select('*').eq('id', user.id).single();
  currentProf = data;
  if (!currentProf || !['teacher', 'admin'].includes(currentProf.role)) {
    await db.auth.signOut();
    return showToast('Accès réservé aux professeurs', true);
  }
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  showPage('planning');
}

// Init
(async () => {
  // Handle password reset from email link
  const hash = window.location.hash;
  if (hash.includes('type=recovery')) {
    showResetPassword();
    document.getElementById('p-reset-email').placeholder = 'Entre ton nouveau mot de passe ci-dessous';
    return;
  }
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) await initProf(session.user);
})();

db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    const newPwd = prompt('Entre ton nouveau mot de passe :');
    if (newPwd) {
      const { error } = await db.auth.updateUser({ password: newPwd });
      if (error) return showToast(error.message, true);
      showToast('Mot de passe mis à jour !');
    }
  } else if (event === 'SIGNED_IN' && session?.user && !currentUser) {
    await initProf(session.user);
  }
});

// ── NAVIGATION ────────────────────────────────────────────
function showPage(page) {
  ['planning','eleves','communaute','stats','profil'].forEach(p => {
    document.getElementById('nav-'+p)?.classList.remove('active');
    document.getElementById('mob-'+p)?.classList.remove('active');
  });
  document.getElementById('nav-'+page)?.classList.add('active');
  document.getElementById('mob-'+page)?.classList.add('active');
  const pages = { planning: loadPlanning, eleves: loadEleves, communaute: loadCommunaute, stats: loadStats, profil: loadProfil };
  if (pages[page]) pages[page]();
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isErr ? '#e87a7a44' : 'var(--border)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal(e) { if (!e || e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open'); }

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

// ── PLANNING ──────────────────────────────────────────────
let profStudioView = false;

async function loadPlanning() {
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div>Chargement…</div>';

  const today = new Date();
  const dow = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - dow + profWeekOffset * 7);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);

  const fmt = d => d.toISOString().slice(0,10);
  const weekLabel = `${weekStart.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`;

  let instancesQuery = db.from('course_instances')
    .select('*, courses(id, custom_name, start_time, duration_minutes, max_students, salle, disciplines(name,color)), profiles(full_name)')
    .gte('date', fmt(weekStart))
    .lte('date', fmt(weekEnd))
    .neq('status','cancelled')
    .order('date').order('courses(start_time)');
  if (!profStudioView) instancesQuery = instancesQuery.eq('teacher_id', currentUser.id);

  const { data: instances } = await instancesQuery;

  const { data: allInstances } = await db.from('course_instances')
    .select('id, date')
    .eq('teacher_id', currentUser.id)
    .gte('date', fmt(today))
    .order('date').limit(20);

  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i); return d;
  });
  const byDate = {};
  (instances||[]).forEach(ci => {
    if (!byDate[ci.date]) byDate[ci.date] = { air: [], terre: [] };
    const s = ci.courses?.salle === 'terre' ? 'terre' : 'air';
    byDate[ci.date][s].push(ci);
  });

  // Prochain cours
  const allFuture = (instances||[]).filter(ci => ci.date >= fmt(today)).sort((a,b) => a.date.localeCompare(b.date) || a.courses?.start_time?.localeCompare(b.courses?.start_time));
  const next = allFuture[0];

  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="page-title" style="margin-bottom:0">${profStudioView ? 'Planning du studio' : 'Mon Planning'}</div>
      <div style="display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:2px">
        <button onclick="profStudioView=false;loadPlanning()" style="padding:5px 10px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:${!profStudioView?'600':'400'};background:${!profStudioView?'var(--accent)':'transparent'};color:${!profStudioView?'#fff':'var(--text2)'}">Mes cours</button>
        <button onclick="profStudioView=true;loadPlanning()" style="padding:5px 10px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:${profStudioView?'600':'400'};background:${profStudioView?'var(--accent)':'transparent'};color:${profStudioView?'#fff':'var(--text2)'}">Studio</button>
      </div>
    </div>

    ${next ? `<div style="background:linear-gradient(135deg,var(--accent)22,var(--accent)11);border:1px solid var(--accent)44;border-radius:16px;padding:16px;margin-bottom:20px">
      <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Prochain cours</div>
      <div style="font-size:16px;font-weight:600">${next.courses?.custom_name || 'Cours'}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">${new Date(next.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})} · ${next.courses?.start_time?.slice(0,5)}</div>
      <button onclick="openSeance('${next.id}')" style="margin-top:10px;padding:6px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:500">Voir les présences →</button>
    </div>` : ''}

    <div class="week-nav">
      <button onclick="profWeekOffset--;loadPlanning()">‹</button>
      <span style="font-size:14px;font-weight:500;flex:1;text-align:center">${weekLabel}</span>
      <button onclick="profWeekOffset++;loadPlanning()">›</button>
      ${profWeekOffset !== 0 ? `<button onclick="profWeekOffset=0;loadPlanning()" style="font-size:12px;color:var(--accent)">Aujourd'hui</button>` : ''}
    </div>

    <div style="display:flex;background:var(--bg2);border-radius:12px;padding:4px;gap:2px;margin-bottom:16px">
      ${days.slice(0,6).map((d, i) => {
        const isToday = fmt(d) === fmt(today);
        const isActive = i === profPlanningDay;
        const label = JOURS[i].slice(0,3);
        return `<button onclick="profPlanningDay=${i};loadPlanning()" style="flex:1;padding:8px 4px;border:none;cursor:pointer;border-radius:10px;font-size:12px;font-weight:${isActive?'700':'400'};background:${isActive?'var(--accent)':'transparent'};color:${isActive?'#fff':isToday?'var(--accent)':'var(--text2)'}">
          <div>${label}</div><div style="font-size:11px;opacity:0.8">${d.getDate()}</div>
        </button>`;
      }).join('')}
    </div>
    ${(() => {
      const selDay = days[profPlanningDay];
      const data = byDate[fmt(selDay)] || { air: [], terre: [] };
      const allCours = [...data.air, ...data.terre].sort((a,b) => a.courses?.start_time?.localeCompare(b.courses?.start_time));
      if (!allCours.length) return `<div style="text-align:center;padding:40px;color:var(--text3)">Aucun cours ce jour</div>`;
      return allCours.map(ci => {
        const color = ci.courses?.disciplines?.color || '#a78bfa';
        const name = ci.courses?.custom_name || ci.courses?.disciplines?.name || 'Cours';
        const isMine = ci.teacher_id === currentUser.id;
        const teacherName = ci.profiles?.full_name || '';
        return `<div onclick="${isMine ? `openSeance('${ci.id}')` : ''}" style="background:var(--card);border-left:4px solid ${color};border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:${isMine?'pointer':'default'};opacity:${isMine?'1':'0.75'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>

async function openMessageCours(instanceId) {
  const { data: bookings } = await db.from('bookings')
    .select('student_id, profiles(full_name, phone)')
    .eq('course_instance_id', instanceId).eq('status','confirmed');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">Message aux élèves</div>
    <div class="form-group">
      <label>Ton message</label>
      <textarea id="msg-text" rows="4" placeholder="Ex: Je suis en retard de 10 min, le cours commence à 19h10 !"></textarea>
    </div>
    <button class="btn btn-primary" onclick="sendMessageCours('${instanceId}')">Envoyer la notification in-app</button>
    <div style="margin-top:16px">
      <div class="section-title">Ou envoyer via WhatsApp</div>
      ${(bookings||[]).filter(b => b.profiles?.phone).map(b => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px">${b.profiles.full_name}</span>
          <a id="wa-${b.student_id}" href="#" target="_blank" style="font-size:12px;background:#25d36622;color:#25d366;padding:4px 10px;border-radius:8px;text-decoration:none">WhatsApp</a>
        </div>`).join('') || '<div style="color:var(--text3);font-size:12px">Aucun numéro enregistré</div>'}
    </div>
    <button class="btn btn-ghost" style="margin-top:16px" onclick="updateWALinks(${JSON.stringify((bookings||[]).filter(b=>b.profiles?.phone).map(b=>({id:b.student_id,phone:b.profiles.phone})))})">Mettre à jour les liens WhatsApp</button>
  `;
  openModal();
}

function updateWALinks(students) {
  const msg = encodeURIComponent(document.getElementById('msg-text').value || '');
  students.forEach(s => {
    const el = document.getElementById('wa-'+s.id);
    if (el) el.href = `https://wa.me/${s.phone.replace(/\D/g,'')}?text=${msg}`;
  });
  showToast('Liens mis à jour !');
}

async function sendMessageCours(instanceId) {
  const text = document.getElementById('msg-text').value.trim();
  if (!text) return showToast('Écris un message', true);
  const { data: bookings } = await db.from('bookings')
    .select('student_id').eq('course_instance_id', instanceId).eq('status','confirmed');
  const studentIds = (bookings||[]).map(b => b.student_id);
  if (!studentIds.length) return showToast('Aucune élève inscrite', true);
  const rows = studentIds.map(id => ({ user_id: id, message: text, type: 'info' }));
  const { error } = await db.from('notifications').insert(rows);
  if (error) return showToast(error.message, true);
  showToast(`Message envoyé à ${studentIds.length} élève${studentIds.length>1?'s':''} !`);
  closeModal();
}

async function saveSeanceNote(instanceId) {
  const note = document.getElementById('seance-note').value;
  const { error } = await db.from('course_instances').update({ note }).eq('id', instanceId);
  if (error) return showToast(error.message, true);
  showToast('Note sauvegardée !');
}

async function profMarkAttendance(bookingId, attended, instanceId) {
  const { error } = await db.from('bookings').update({ attended }).eq('id', bookingId);
  if (error) return showToast(error.message, true);
  openSeance(instanceId);
}

async function openProfPayment(studentId, name) {
  const { data: products } = await db.from('products').select('*').eq('is_active', true).in('type', ['carte']).order('sort_order');
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">Encaisser un forfait — ${name}</div>
    <div class="form-group"><label>Forfait</label>
      <select id="pp-product">${(products||[]).map(p => `<option value="${p.id}" data-sessions="${p.sessions_count}" data-valid="${p.valid_for}" data-days="${p.validity_days || 120}" data-price="${p.price_cents}">${p.name} (${p.sessions_count} séances · ${Math.round((p.price_cents||0)/100)} €)</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Mode de paiement</label>
      <select id="pp-method">
        <option value="especes">💵 Espèces</option>
        <option value="virement">🏦 Virement</option>
        <option value="cheque">📄 Chèque</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-primary" onclick="saveProfPayment('${studentId}')" style="flex:1">✓ Enregistrer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
    </div>
  `;
}

async function saveProfPayment(studentId) {
  const sel = document.getElementById('pp-product');
  const opt = sel.options[sel.selectedIndex];
  const productId = parseInt(sel.value);
  const sessions = parseInt(opt.dataset.sessions);
  const validFor = opt.dataset.valid;
  const days = parseInt(opt.dataset.days);
  const priceCents = parseInt(opt.dataset.price) || 0;
  const method = document.getElementById('pp-method').value;
  const expires = new Date(Date.now() + days * 86400000).toISOString();

  const [creditResult, orderResult] = await Promise.all([
    db.from('student_credits').insert({ student_id: studentId, product_id: productId, sessions_remaining: sessions, sessions_total: sessions, valid_for: validFor, expires_at: expires }),
    db.from('orders').insert({ student_id: studentId, product_id: productId, amount_cents: priceCents, status: 'paid', payment_method: method }),
  ]);
  if (creditResult.error) return showToast(creditResult.error.message, true);
  if (orderResult.error) return showToast('Crédit OK mais ordre échoué : ' + orderResult.error.message, true);
  closeModal();
  showToast('Paiement enregistré !');
}

async function saveObjectives(studentId) {
  const objectives = document.getElementById('eleve-objectives-'+studentId).value;
  const { error } = await db.from('teacher_student_notes')
    .upsert({ teacher_id: currentUser.id, student_id: studentId, objectives, updated_at: new Date().toISOString() }, { onConflict: 'teacher_id,student_id' });
  if (error) return showToast(error.message, true);
  showToast('Objectifs sauvegardés !');
}

    .select('*, profiles(full_name, avatar_url, role), community_reactions(emoji, user_id), community_comments(id)')
    .eq('audience', audience)
    .order('is_pinned', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(30);

  const postHtml = (posts || []).map(p => {
    const initials = p.profiles?.full_name?.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) || '?';
    const avatar = p.profiles?.avatar_url
      ? `<img src="${p.profiles.avatar_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`
      : `<div style="width:36px;height:36px;border-radius:50%;background:var(--accent)22;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--accent);flex-shrink:0">${initials}</div>`;
    const role = p.profiles?.role;
    const badge = role === 'admin' ? `<span style="font-size:9px;background:rgba(155,125,219,0.2);color:var(--accent);padding:2px 6px;border-radius:10px;margin-left:6px">Ana</span>`
      : role === 'teacher' ? `<span style="font-size:9px;background:var(--accent)22;color:var(--accent);padding:2px 6px;border-radius:10px;margin-left:6px">Prof</span>` : '';
    const liked = p.community_reactions?.some(r => r.user_id === currentUser.id);
    const likeCount = p.community_reactions?.length || 0;
    const commentCount = p.community_comments?.length || 0;
    const ago = (() => { const s=(Date.now()-new Date(p.created_at))/1000; return s<60?'À l\'instant':s<3600?Math.floor(s/60)+'min':s<86400?Math.floor(s/3600)+'h':Math.floor(s/86400)+'j'; })();
    return `<div style="background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:10px${p.is_pinned?';border:1px solid var(--accent)33':''}">
      <div style="display:flex;gap:10px;align-items:flex-start">
        ${avatar}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;margin-bottom:6px">
            <span style="font-size:13px;font-weight:500">${p.profiles?.full_name || '?'}</span>${badge}
            <span style="font-size:10px;color:var(--text3);margin-left:auto">${ago}</span>
          </div>
          <div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px">${p.content}</div>
          <div id="comments-${p.id}" style="display:none;margin-bottom:10px"></div>
          <div style="display:flex;gap:16px">
            <button onclick="profToggleLike(${p.id},this)" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;color:${liked?'#e87a7a':'var(--text3)'};font-size:13px">${liked?'❤️':'🤍'} <span>${likeCount}</span></button>
            <button onclick="toggleProfComments(${p.id})" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--text3);font-size:13px">💬 <span id="ccount-${p.id}">${commentCount}</span></button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('') || `<div style="text-align:center;padding:40px 20px;color:var(--text3)">Aucun post pour l'instant</div>`;

  el.innerHTML = `
    <div style="background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:16px">
      <textarea id="comm-text" placeholder="${isProfs ? 'Écris un message aux profs…' : 'Écris un message aux élèves…'}" style="width:100%;background:transparent;border:none;color:var(--text);font-size:14px;resize:none;outline:none;min-height:70px;font-family:inherit"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button onclick="profPostComm()" style="padding:8px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500">Publier</button>
      </div>
    </div>
    ${postHtml}
  `;
}

async function profPostComm() {
  const content = document.getElementById('comm-text').value.trim();
  if (!content) return showToast('Écris quelque chose d\'abord', true);
  const audience = commTab === 'profs' ? 'teachers' : 'all';
  const { error } = await db.from('community_posts').insert({ author_id: currentUser.id, content, audience });
  if (error) return showToast(error.message, true);
  showToast('Publié !');
  await renderCommTab();
}

async function toggleProfComments(postId) {
  const box = document.getElementById('comments-' + postId);
  if (!box) return;
  if (box.style.display !== 'none') { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.innerHTML = '<div style="font-size:12px;color:var(--text3)">Chargement…</div>';
  const { data: comments } = await db.from('community_comments')
    .select('*, profiles(full_name, avatar_url)')
    .eq('post_id', postId)
    .order('created_at', { ascending: true });
  const commHtml = (comments||[]).map(c => {
    const initials = c.profiles?.full_name?.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)||'?';
    const av = c.profiles?.avatar_url
      ? `<img src="${c.profiles.avatar_url}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : `<div style="width:26px;height:26px;border-radius:50%;background:var(--accent)22;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent);flex-shrink:0">${initials}</div>`;
    return `<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px">
      ${av}
      <div style="background:var(--bg);border-radius:10px;padding:7px 10px;flex:1">
        <div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px">${c.profiles?.full_name||'?'}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.4">${c.content}</div>
      </div>
    </div>`;
  }).join('') || '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Aucun commentaire</div>';
  box.innerHTML = `
    <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">
      ${commHtml}
      <div style="display:flex;gap:8px;margin-top:6px">
        <input id="cinput-${postId}" placeholder="Ajouter un commentaire…" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);font-family:inherit">
        <button onclick="sendProfComment(${postId})" style="padding:7px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px">Envoyer</button>
      </div>
    </div>`;
}

async function sendProfComment(postId) {
  const input = document.getElementById('cinput-' + postId);
  const content = input?.value.trim();
  if (!content) return;
  const { error } = await db.from('community_comments').insert({ post_id: postId, author_id: currentUser.id, content });
  if (error) return showToast(error.message, true);
  const countEl = document.getElementById('ccount-' + postId);
  if (countEl) countEl.textContent = parseInt(countEl.textContent||'0') + 1;
  await toggleProfComments(postId);
  await toggleProfComments(postId);
}

async function profToggleLike(postId, btn) {
  const { data: existing } = await db.from('community_reactions').select('id').eq('post_id', postId).eq('user_id', currentUser.id).maybeSingle();
  if (existing) {
    await db.from('community_reactions').delete().eq('id', existing.id);
  } else {
    await db.from('community_reactions').insert({ post_id: postId, user_id: currentUser.id, emoji: '❤️' });
  }
  await renderCommTab();
}

// ── MES STATS ─────────────────────────────────────────────
async function loadStats() {
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div>Chargement…</div>';

  const today = new Date().toISOString().split('T')[0];
  const monthStart = today.slice(0,7) + '-01';

  const { data: myInstances } = await db.from('course_instances')
    .select('id, date, courses(custom_name, max_students, disciplines(name,color))')
    .eq('teacher_id', currentUser.id)
    .gte('date', monthStart).lte('date', today)
    .neq('status','cancelled');

  const instanceIds = (myInstances||[]).map(ci => ci.id);
  const { data: bookings } = instanceIds.length
    ? await db.from('bookings').select('course_instance_id, attended').eq('status','confirmed').in('course_instance_id', instanceIds)
    : { data: [] };

  const totalCours = myInstances?.length || 0;
  const totalEleves = new Set((bookings||[]).map(b => b.course_instance_id)).size;
  const totalPresent = (bookings||[]).filter(b => b.attended).length;
  const totalBookings = (bookings||[]).length;
  const presentRate = totalBookings > 0 ? Math.round(totalPresent / totalBookings * 100) : 0;

  // Stats par cours
  const courseStats = {};
  (myInstances||[]).forEach(ci => {
    const name = ci.courses?.custom_name || ci.courses?.disciplines?.name || 'Cours';
    const color = ci.courses?.disciplines?.color || '#a78bfa';
    const max = ci.courses?.max_students || 10;
    if (!courseStats[name]) courseStats[name] = { count:0, bookings:0, max, color };
    courseStats[name].count++;
    courseStats[name].bookings += (bookings||[]).filter(b => b.course_instance_id === ci.id).length;
  });

  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Mes stats</div>
    <div class="page-sub">${new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>

    <div class="grid-3">
      <div class="stat-card"><div class="stat-val">${totalCours}</div><div class="stat-lbl">Cours donnés</div></div>
      <div class="stat-card"><div class="stat-val">${totalBookings}</div><div class="stat-lbl">Passages élèves</div></div>
      <div class="stat-card"><div class="stat-val">${presentRate}%</div><div class="stat-lbl">Taux de présence</div></div>
    </div>

    <div class="section-title">Remplissage par cours</div>
    <div class="card">
      ${Object.entries(courseStats).map(([name, s]) => {
        const avg = s.count > 0 ? Math.round(s.bookings / s.count) : 0;
        const pct = Math.round(avg / s.max * 100);
        return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:13px">${name}</span>
            <span style="font-size:12px;color:var(--text3)">${avg}/${s.max} en moyenne</span>
          </div>
          <div style="height:4px;background:var(--border);border-radius:2px">
            <div style="height:4px;background:${s.color};border-radius:2px;width:${pct}%"></div>
          </div>
        </div>`;
      }).join('') || '<div style="color:var(--text3);font-size:13px">Pas encore de données ce mois</div>'}
    </div>
  `;
}

// ── MON PROFIL ────────────────────────────────────────────
async function loadProfil() {
  const { data: teacher } = await db.from('teachers').select('*').eq('id', currentUser.id).single();

  const avatarUrl = currentProf?.avatar_url;
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">Mon profil</div>
    <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px">
      ${avatarUrl
        ? `<img src="${avatarUrl}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--accent)33">`
        : `<div style="width:80px;height:80px;border-radius:50%;background:var(--accent)22;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--accent)">${currentProf?.full_name?.[0]||'?'}</div>`}
      <label style="cursor:pointer;padding:8px 18px;border-radius:10px;border:1px solid var(--border);font-size:13px;color:var(--text2)">
        📷 Changer ma photo
        <input type="file" accept="image/*" onchange="uploadProfAvatar(this)" style="display:none">
      </label>
    </div>
    <div class="card">
      <div class="form-group"><label>Nom complet</label><input id="pr-name" value="${currentProf?.full_name||''}"></div>
      <div class="form-group"><label>Téléphone</label><input id="pr-phone" value="${currentProf?.phone||''}"></div>
      <div class="form-group"><label>Disciplines</label><input id="pr-disc" value="${(teacher?.disciplines||[]).join(', ')}"></div>
      <div class="form-group"><label>Bio</label><textarea id="pr-bio" rows="3">${teacher?.bio||''}</textarea></div>
      <div class="form-group"><label>Instagram</label><input id="pr-insta" value="${teacher?.instagram||''}" placeholder="@handle"></div>
      <button class="btn btn-primary" onclick="saveProfil()">Enregistrer</button>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="section-title">Proposer un workshop ou cours spécial</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.6">Indique tes jours et horaires disponibles si tu souhaites proposer un workshop, un cours spécial ou une collaboration en dehors de tes cours récurrents. Ana recevra ton message directement.</div>
      <textarea id="pr-dispos" rows="5" placeholder="Ex : Je suis disponible le samedi matin pour un workshop souplesse en novembre, et le mercredi soir pour un duo cerceau aérien…">${(teacher?.disponibilites||[]).message||teacher?.disponibilites?.message||''}</textarea>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="saveDisponibilites()">Envoyer à Ana</button>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="section-title">Changer mon mot de passe</div>
      <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="pr-pwd" placeholder="Minimum 6 caractères"></div>
      <button class="btn btn-ghost" onclick="changePassword()">Mettre à jour le mot de passe</button>
    </div>
  `;
}

async function saveDisponibilites() {
  const message = document.getElementById('pr-dispos').value.trim();
  const disponibilites = { message, updated_at: new Date().toISOString() };
  const { error } = await db.from('teachers').upsert({ id: currentUser.id, disponibilites });
  if (error) return showToast(error.message, true);
  showToast('Message envoyé à Ana ✨');
}

async function saveProfil() {
  const name = document.getElementById('pr-name').value.trim();
  const phone = document.getElementById('pr-phone').value.trim();
  const disciplines = document.getElementById('pr-disc').value.split(',').map(s=>s.trim()).filter(Boolean);
  const bio = document.getElementById('pr-bio').value;
  const instagram = document.getElementById('pr-insta').value;

  await db.from('profiles').update({ full_name: name, phone }).eq('id', currentUser.id);
  await db.from('teachers').upsert({ id: currentUser.id, disciplines, bio, instagram });
  currentProf.full_name = name;
  showToast('Profil mis à jour !');
}

async function uploadProfAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) return showToast('Image trop lourde (max 2 Mo)', true);
  showToast('Envoi en cours…');
  const ext = file.name.split('.').pop();
  const path = `avatars/${currentUser.id}.${ext}`;
  const { error: upErr } = await db.storage.from('avatars').upload(path, file, { upsert: true });
  if (upErr) return showToast(upErr.message, true);
  const { data: { publicUrl } } = db.storage.from('avatars').getPublicUrl(path);
  await db.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
  currentProf.avatar_url = publicUrl;
  showToast('Photo mise à jour !');
  loadProfil();
}

async function changePassword() {
  const pwd = document.getElementById('pr-pwd').value;
  if (pwd.length < 6) return showToast('Minimum 6 caractères', true);
  const { error } = await db.auth.updateUser({ password: pwd });
  if (error) return showToast(error.message, true);
  showToast('Mot de passe mis à jour !');
  document.getElementById('pr-pwd').value = '';
}
</script>
